<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Watch Tracker{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⌚</text></svg>">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">⌚ Watch Tracker</a>
    {% if not smtp_configured() %}
      <span class="smtp-warning" title="Set SMTP_HOST etc. in .env to enable email alerts">
        email alerts off — SMTP not configured
      </span>
    {% endif %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">Checks run automatically in the background. Refresh for the latest.</footer>
</body>
</html>
