# Checks tracked sites on a schedule, emails alerts, commits tracker state
# back to the repo, and publishes a read-only dashboard to GitHub Pages.
#
# Setup:
#   1. Repo Settings -> Pages -> Source: "GitHub Actions"
#   2. Repo Settings -> Secrets and variables -> Actions -> add:
#      SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, EMAIL_FROM, EMAIL_TO
#      (all optional — without them you get the dashboard but no emails)
#
# Note: scheduled workflows only run from the repo's DEFAULT branch, and
# GitHub may delay them by a few minutes under load.

name: Check sites and deploy dashboard

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tracker
  cancel-in-progress: false

env:
  DATABASE_PATH: state/watchtracker.db

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Check sites and build dashboard
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m app.cron --output public

      - name: Commit updated tracker state
        run: |
          git config user.name "watch-tracker[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          if ! git diff --cached --quiet; then
            git commit -m "Update tracker state [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
